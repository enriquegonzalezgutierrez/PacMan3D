<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark Cyber Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#030408" />
    </radialGradient>
    
    <!-- Glowing Neon Yellow Gradient for Pac-Man -->
    <radialGradient id="pac-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffaa" />
      <stop offset="60%" stop-color="#ffea00" />
      <stop offset="100%" stop-color="#e6b800" />
    </radialGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded Background Board with glowing neon blue border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg-grad)" stroke="#00e5ff" stroke-width="12" filter="url(#neon-glow)" />

  <!-- Aesthetic Cyber Circuit Grid Lines on background -->
  <path d="M 80 16 L 80 496 M 432 16 L 432 496 M 16 80 L 496 80 M 16 432 L 496 432" stroke="#005577" stroke-width="2" opacity="0.3" />
  
  <!-- Glowing Pellet dots leading to Pac-man -->
  <circle cx="340" cy="256" r="14" fill="#ffea00" filter="url(#neon-glow)" />
  <circle cx="410" cy="256" r="14" fill="#ffea00" filter="url(#neon-glow)" />

  <!-- Glowing Neon Yellow Pac-Man facing right with an open mouth -->
  <path d="M 200 256 L 292 164 A 130 130 0 1 0 292 348 Z" fill="url(#pac-grad)" filter="url(#neon-glow)" />

  <!-- Retro Classic Eye -->
  <circle cx="210" cy="180" r="28" fill="#ffffff" />
  <circle cx="215" cy="180" r="12" fill="#00cc22" />

  <!-- Neon Pink Ghost Silhouette floating behind -->
  <g transform="translate(10, 10) rotate(-15 100 320)" filter="url(#neon-glow)">
    <!-- Ghost Body -->
    <path d="M 60 320 C 60 260 140 260 140 320 L 140 370 L 124 354 L 108 370 L 92 354 L 76 370 L 60 354 Z" fill="#ff00d0" opacity="0.85" />
    <!-- Sclera -->
    <circle cx="85" cy="300" r="12" fill="#ffffff" />
    <circle cx="115" cy="300" r="12" fill="#ffffff" />
    <!-- Pupil -->
    <circle cx="89" cy="300" r="5" fill="#0022ff" />
    <circle cx="119" cy="300" r="5" fill="#0022ff" />
  </g>
</svg>